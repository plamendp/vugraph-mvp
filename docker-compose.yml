services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - centrifugo

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://vugraph:vugraph@postgres:5432/vugraph
      - OPERATOR_TOKEN=operator-secret
      - CENTRIFUGO_API_URL=http://centrifugo:8000/api
      - CENTRIFUGO_API_KEY=centrifugo-api-key
      - CENTRIFUGO_TOKEN_SECRET=centrifugo-token-secret
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_started

  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo -c config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "8000:8000"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=vugraph
      - POSTGRES_PASSWORD=vugraph
      - POSTGRES_DB=vugraph
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vugraph"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
