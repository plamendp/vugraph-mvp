services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - centrifugo
      - operator
      - spectator

  operator:
    build: ./apps/operator
    ports:
      - "5001:5001"
    volumes:
      - ./apps/operator/src:/app/apps/operator/src
      - ./packages/ui/src:/app/packages/ui/src
      - ./packages/types/src:/app/packages/types/src

  spectator:
    build: ./apps/spectator
    ports:
      - "5002:5002"
    volumes:
      - ./apps/spectator/src:/app/apps/spectator/src
      - ./packages/ui/src:/app/packages/ui/src
      - ./packages/types/src:/app/packages/types/src

  backend:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ./api/src:/app/api/src
      - ./packages/types:/app/packages/types
    env_file:
      - .env
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - LOCAL_DEV=true
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - CENTRIFUGO_TOKEN_SECRET=${CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      centrifugo:
        condition: service_started
  centrifugo:
    image: centrifugo/centrifugo:v6
    command: centrifugo -c config.json
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ports:
      - "8000:8000"
    env_file:
      - .env
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
